name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Schema compatibility check
        run: node dist/check-schema-compat-cli.js
      - name: Detect-load-failure script integration test
        run: bash test/integration/load-detection/test.sh
      - name: Boundary prelude integration test
        run: bash test/integration/boundary-prelude/test.sh
      - run: ./scripts/build-fixture-only.sh

  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: flat-white:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run fixture container smoke test
        run: |
          mkdir -p output
          docker run --rm \
            -v "$(pwd)/output:/output" \
            flat-white:ci \
            --fixture-only \
            --compress \
            --output /output
      - name: Verify fixture container output
        run: |
          shopt -s nullglob
          files=(output/flat-white-*.ndjson.gz)
          if [[ ${#files[@]} -ne 1 ]]; then
            echo "ERROR: Expected exactly one gzipped output file, found ${#files[@]}"
            ls -la output || true
            exit 1
          fi

          gzip -t "${files[0]}"
          lines=$(zcat "${files[0]}" | wc -l | tr -d ' ')
          echo "Fixture container produced ${lines} documents in ${files[0]}"

          if [[ "$lines" -eq 0 ]]; then
            echo "ERROR: Fixture container output is empty"
            exit 1
          fi
