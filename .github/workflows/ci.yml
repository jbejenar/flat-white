name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Schema compatibility check
        run: node dist/check-schema-compat-cli.js
      - name: Boundary prelude integration test
        run: bash test/integration/boundary-prelude/test.sh
      - name: Cache validator integration test
        run: bash test/integration/cache-validator/test.sh
      - run: ./scripts/build-fixture-only.sh

  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: docker/setup-buildx-action@v4
      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: flat-white:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run fixture container smoke test
        run: |
          mkdir -p output
          docker run --rm \
            -v "$(pwd)/output:/output" \
            flat-white:ci \
            --fixture-only \
            --compress \
            --output /output
      - name: Verify fixture container output
        run: |
          shopt -s nullglob
          files=(output/fixture.ndjson.gz)
          if [[ ${#files[@]} -ne 1 ]]; then
            echo "ERROR: Expected fixture.ndjson.gz, found ${#files[@]} matching files"
            ls -la output || true
            exit 1
          fi

          gzip -t "${files[0]}"
          lines=$(zcat "${files[0]}" | wc -l | tr -d ' ')
          echo "Fixture container produced ${lines} documents in ${files[0]}"

          if [[ "$lines" -eq 0 ]]; then
            echo "ERROR: Fixture container output is empty"
            exit 1
          fi

  # Compute whether the shape smoke is worth running for this PR. The shape
  # smoke rebuilds the Docker image and re-runs the fixture pipeline (~10-15
  # min); paying that cost on every doc-only or unrelated PR is wasteful. We
  # only need it when something in the pipeline surface area changed.
  detect-shape-smoke-relevance:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # On push to main: always run (we want a clean signal on main).
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Pipeline-relevant paths. If a PR touches any of these, the shape
          # smoke runs. Anything else (docs, NEXT-WORK.md, ROADMAP.md, etc.)
          # is skipped to save CI minutes and developer wall time.
          #
          # `gnaf-loader` (both the submodule pointer `^gnaf-loader$` and any
          # nested path `^gnaf-loader/`) is explicitly included — a submodule
          # bump is one of the highest-risk inputs to the load/flatten path
          # and must never skip the smoke.
          PATTERN='^(Dockerfile|docker-entrypoint\.sh|scripts/|sql/|src/(split|verification-report|metadata|manifest|compress|verify|schema|flatten)\.ts|fixtures/|test/|\.github/workflows/ci\.yml|package(-lock)?\.json|tsconfig\.json|\.nvmrc|gnaf-loader$|gnaf-loader/)'

          # 3-dot diff = changes from merge-base to HEAD (true PR delta), not
          # `git diff A B` which compares snapshots and would flag files that
          # only changed on main since the PR branched.
          if git diff --name-only "${BASE_SHA}...${HEAD_SHA}" | grep -qE "$PATTERN"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No pipeline-relevant paths changed; quarterly-shape-smoke will be skipped"
          fi

  quarterly-shape-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [quality, detect-shape-smoke-relevance]
    if: needs.detect-shape-smoke-relevance.outputs.relevant == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: docker/setup-buildx-action@v4
      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: flat-white:quarterly-smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run fixture container
        run: |
          mkdir -p output
          docker run --rm \
            -v "$(pwd)/output:/output" \
            flat-white:quarterly-smoke \
            --fixture-only \
            --output /output
      - name: Assemble quarterly-style fixture assets
        run: node scripts/run-quarterly-fixture-smoke.mjs
      - name: Upload quarterly-shape smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quarterly-shape-smoke
          path: |
            output/quarterly-fixture-assets/**
          retention-days: 7
