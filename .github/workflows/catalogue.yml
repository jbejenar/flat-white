# Deploy GitHub Pages catalogue after each successful Quarterly Build.
#
# E1.28 (2026-04-09): switched trigger from `release: types: [published]` to
# `workflow_run: workflows: [Quarterly Build]`. Reason: GitHub Actions does
# NOT fire workflow events from releases created by GITHUB_TOKEN actions
# (recursion prevention). Quarterly Build creates releases via the workflow's
# bot token, so the previous `release.published` trigger never fired and the
# catalogue had zero runs since creation. The `workflow_run` trigger IS fired
# by GITHUB_TOKEN actions and is the documented escape hatch for chaining
# workflows. See ROADMAP entry E1.28 for the full context.
#
# Defense in depth (added 2026-04-09 in response to bot review on PR #112):
# Quarterly Build's release job succeeds whether the GitHub Release is
# published OR kept as a draft due to anomalies (the manual-review path).
# Without an additional gate here, the catalogue would re-run and fetch
# draft releases via GITHUB_TOKEN, leaking metadata + draft asset links to
# the public GitHub Pages output.
#
# Two layers of defense:
#   1. The 'Verify a published release exists' step below queries the
#      latest release state via gh api and exits early (success, no-op)
#      if the latest release is a draft. This prevents the workflow from
#      generating against incomplete state.
#   2. src/generate-catalogue.ts also filters out draft AND prerelease
#      entries from the API response. Belt-and-braces — the workflow
#      check covers manual workflow_dispatch runs that bypass the
#      workflow_run trigger.
#
# Also supports manual dispatch for re-generation against the current state
# of releases (useful for backfilling, recovery, or after manual edits).

name: Catalogue

on:
  workflow_run:
    workflows: ["Quarterly Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Only run if the upstream Quarterly Build succeeded.
    # workflow_run fires on every completion (success/failure/cancelled);
    # this guard limits us to the success path. workflow_dispatch always
    # passes (no upstream workflow_run context).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify a published release exists (skip if latest is draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Quarterly Build's release job succeeds whether the release is
          # published or kept as a draft. We must NOT regenerate the
          # catalogue from a draft state — the public GitHub Pages output
          # would leak draft asset links and metadata.
          #
          # gh release view (no args) returns the latest non-draft release.
          # If there are no published releases at all (first-ever build, or
          # all releases deleted), this returns an error and we exit early.
          if ! gh release view \
                 --repo "${{ github.repository }}" \
                 --json tagName,isDraft,isPrerelease \
                 > /tmp/latest-release.json 2>/dev/null; then
            echo "::warning::No published releases found — skipping catalogue generation"
            exit 0
          fi
          LATEST_TAG=$(jq -r '.tagName' /tmp/latest-release.json)
          IS_DRAFT=$(jq -r '.isDraft' /tmp/latest-release.json)
          IS_PRERELEASE=$(jq -r '.isPrerelease' /tmp/latest-release.json)
          echo "Latest non-draft release: ${LATEST_TAG}"
          echo "  isDraft: ${IS_DRAFT}"
          echo "  isPrerelease: ${IS_PRERELEASE}"
          # Belt-and-braces: gh release view excludes drafts by default,
          # so isDraft should always be false here. But check anyway in case
          # the gh CLI behavior changes.
          if [[ "$IS_DRAFT" == "true" ]]; then
            echo "::warning::Latest release is draft — skipping catalogue generation"
            exit 0
          fi
          echo "✓ Latest release is published — proceeding with catalogue generation"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Generate catalogue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: node dist/generate-catalogue.js --repo "$REPO" --out dist/catalogue/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/catalogue

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
