name: ARI Score

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  ariscan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - run: npm ci

      - name: Run ariscan
        id: scan
        run: |
          if ! npx @prontiq/ariscan-cli . --json > /tmp/ariscan.json 2>/dev/null; then
            echo "ariscan failed — skipping README update"
            echo "score=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! jq -e '.score' /tmp/ariscan.json > /dev/null 2>&1; then
            echo "ariscan output invalid — skipping README update"
            echo "score=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SCORE=$(jq -r '.score' /tmp/ariscan.json)
          LEVEL=$(jq -r '.level' /tmp/ariscan.json)
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          echo "level=$LEVEL" >> "$GITHUB_OUTPUT"
          echo "ARI Score: $SCORE/100 ($LEVEL)"

      - name: Update README badge and score
        if: steps.scan.outputs.score != ''
        run: |
          SCORE="${{ steps.scan.outputs.score }}"
          LEVEL="${{ steps.scan.outputs.level }}"

          # Pick badge colour based on score
          if [ "$SCORE" -ge 80 ]; then
            COLOR="brightgreen"
          elif [ "$SCORE" -ge 60 ]; then
            COLOR="97ca00"
          elif [ "$SCORE" -ge 40 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi

          # Update the shields.io badge in the badges section
          sed -i "s|img.shields.io/badge/ARI-[^\"]*|img.shields.io/badge/ARI-${SCORE}%2F100_${LEVEL}-${COLOR}|g" README.md

          # Update the score in the Project Status table
          sed -i "s|<h3>[0-9]*/100</h3><sub>ARI Score ([^)]*)</sub>|<h3>${SCORE}/100</h3><sub>ARI Score (${LEVEL})</sub>|g" README.md

      - name: Create PR if changed
        if: steps.scan.outputs.score != ''
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update ARI score badge to ${{ steps.scan.outputs.score }}/100"
          title: "chore: update ARI score to ${{ steps.scan.outputs.score }}/100"
          body: "Auto-generated by ariscan workflow. Score: ${{ steps.scan.outputs.score }}/100 (${{ steps.scan.outputs.level }})."
          branch: chore/ariscan-badge-update
          delete-branch: true
