name: Quarterly Build

on:
  workflow_dispatch:
    inputs:
      gnaf_version:
        description: "G-NAF version (e.g. 2026.05). The underlying G-NAF data version — never has a patch suffix."
        required: false
        default: ""
      patch_version:
        description: "Patch version for hotfix releases (e.g. '1' produces v2026.04.1). Leave empty for normal quarterly builds. See E1.13 for the design rationale."
        required: false
        default: ""
      download_url_gnaf:
        description: "Optional manual override for the G-NAF zip URL. Normal quarterly and patch runs auto-discover the target release from data.gov.au."
        required: false
        default: ""
      download_url_admin_bdys:
        description: "Optional manual override for the Admin Boundaries zip URL. Normal quarterly and patch runs auto-discover the target release from data.gov.au."
        required: false
        default: ""
      admin_bdys_extracted_dir:
        description: "Optional manual override for the extracted Admin Boundaries directory name inside /data (e.g. APR26_AdminBounds_GDA_2020_SHP). Only needed with manual URL overrides."
        required: false
        default: ""
      runner:
        description: "Runner label (e.g. 'self-hosted', 'high-memory'). Default: ubuntu-latest"
        required: false
        default: "ubuntu-latest"
  schedule:
    # 15th of Feb, May, Aug, Nov at 02:00 UTC — shortly after quarterly G-NAF release
    - cron: "0 2 15 2,5,8,11 *"

env:
  # Default version: latest published quarterly release for the trigger date
  DOCKER_IMAGE: flat-white
  DB_CACHE_VERSION: v2
  # Optional manual release-data overrides.
  # Priority inside the downloader: workflow_dispatch input > data.gov.au auto-discovery > Feb 2026 fallback for 2026.02 only
  DOWNLOAD_URL_GNAF_EFFECTIVE: ${{ inputs.download_url_gnaf || '' }}
  DOWNLOAD_URL_ADMIN_BDYS_EFFECTIVE: ${{ inputs.download_url_admin_bdys || '' }}
  ADMIN_BDYS_EXTRACTED_DIR_EFFECTIVE: ${{ inputs.admin_bdys_extracted_dir || '' }}

jobs:
  # ---------------------------------------------------------------------------
  # Job 0: Compute version once (avoids drift at month boundaries)
  # ---------------------------------------------------------------------------
  setup:
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_version: ${{ steps.version.outputs.release_version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        env:
          GNAF_INPUT: ${{ inputs.gnaf_version }}
          PATCH_INPUT: ${{ inputs.patch_version }}
        run: |
          # G-NAF data version (always YYYY.MM, used by gnaf-loader for schema names)
          if [[ -n "$GNAF_INPUT" ]]; then
            if [[ ! "$GNAF_INPUT" =~ ^[0-9]{4}\.[0-9]{2}$ ]]; then
              echo "ERROR: Invalid gnaf_version format: '$GNAF_INPUT' (expected YYYY.MM)"
              exit 1
            fi
            VERSION="$GNAF_INPUT"
          else
            VERSION="$(python3 scripts/discover_latest_release.py)"
            if [[ -z "$VERSION" ]]; then
              echo "ERROR: Failed to determine latest quarterly G-NAF release from data.gov.au"
              exit 1
            fi
            echo "::notice::No gnaf_version input provided; auto-discovered latest quarterly release ${VERSION}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Release version (YYYY.MM or YYYY.MM.N for patches)
          # Used for tag, asset filenames, release title — anything user-visible
          if [[ -n "$PATCH_INPUT" ]]; then
            # Must be a positive integer >= 1. Reject "0" and "00" — patch
            # releases start at 1.
            if [[ ! "$PATCH_INPUT" =~ ^[1-9][0-9]*$ ]]; then
              echo "ERROR: Invalid patch_version format: '$PATCH_INPUT' (expected positive integer >= 1)"
              exit 1
            fi
            RELEASE_VERSION="${VERSION}.${PATCH_INPUT}"
            echo "::notice::Patch release: building v${RELEASE_VERSION} from G-NAF data ${VERSION}"
          else
            RELEASE_VERSION="$VERSION"
          fi
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Job 1: Build each state in parallel
  # ---------------------------------------------------------------------------
  build:
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    needs: setup
    # 360 min is the GitHub Actions free-tier maximum. We need this generous
    # budget because the spatial-join fallback in address_full_prep.sql can
    # take 30min-3hr for NSW (~4.6M addresses) when it's the primary path
    # (i.e., when gnaf-loader's Part 5 fails and we retry with --no-boundary-tag).
    # When upstream gnaf-loader is fixed (E1.20), the first attempt succeeds
    # and the build completes in the original ~25 min.
    # Escalation if even 360 min is insufficient: switch to self-hosted runner
    # via the `runner` workflow input (E1.09 documents the procedure).
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        state: [VIC, NSW, QLD, SA, WA, TAS, NT, ACT, OT]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.DOCKER_IMAGE }}:build
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Restore gnaf-loader database dump (E1.06)
        id: db-cache
        uses: actions/cache/restore@v4
        with:
          path: cache
          key: gnaf-${{ env.DB_CACHE_VERSION }}-${{ needs.setup.outputs.version }}-${{ matrix.state }}-${{ hashFiles('gnaf-loader/**', 'docker-entrypoint.sh', 'scripts/**', 'sql/**') }}-${{ github.run_id }}
          restore-keys: |
            gnaf-${{ env.DB_CACHE_VERSION }}-${{ needs.setup.outputs.version }}-${{ matrix.state }}-${{ hashFiles('gnaf-loader/**', 'docker-entrypoint.sh', 'scripts/**', 'sql/**') }}-

      - name: Run pipeline for ${{ matrix.state }}
        run: |
          CACHE_HIT="${{ steps.db-cache.outputs.cache-hit }}" \
          CACHE_MATCHED_KEY="${{ steps.db-cache.outputs.cache-matched-key }}" \
          DOWNLOAD_URL_GNAF_EFFECTIVE="${{ env.DOWNLOAD_URL_GNAF_EFFECTIVE }}" \
          DOWNLOAD_URL_ADMIN_BDYS_EFFECTIVE="${{ env.DOWNLOAD_URL_ADMIN_BDYS_EFFECTIVE }}" \
          ADMIN_BDYS_EXTRACTED_DIR_EFFECTIVE="${{ env.ADMIN_BDYS_EXTRACTED_DIR_EFFECTIVE }}" \
          ./scripts/run-quarterly-state.sh "${{ matrix.state }}" "${{ needs.setup.outputs.version }}" "${{ env.DOCKER_IMAGE }}:build"

      - name: Decide cache save
        if: always()
        id: cache-save
        run: |
          CACHE_FILE="cache/${{ matrix.state }}.dump"
          TELEMETRY_FILE="output/quarterly-telemetry-${{ matrix.state }}.json"

          if [[ ! -f "$CACHE_FILE" ]]; then
            echo "save=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${{ steps.db-cache.outputs.cache-matched-key }}" ]]; then
            echo "save=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -f "$TELEMETRY_FILE" ]] && python3 -c "import json, sys; print(str(json.load(open(sys.argv[1], encoding='utf-8')).get('restoreValidationFailed', False)).lower())" "$TELEMETRY_FILE" | grep -q '^true$'; then
            echo "save=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "save=false" >> "$GITHUB_OUTPUT"

      - name: Save repaired or newly-built gnaf-loader dump
        if: always() && steps.cache-save.outputs.save == 'true'
        uses: actions/cache/save@v4
        with:
          path: cache
          key: gnaf-${{ env.DB_CACHE_VERSION }}-${{ needs.setup.outputs.version }}-${{ matrix.state }}-${{ hashFiles('gnaf-loader/**', 'docker-entrypoint.sh', 'scripts/**', 'sql/**') }}-${{ github.run_id }}

      - name: Report cache status
        if: always()
        run: |
          CACHE_FILE="cache/${{ matrix.state }}.dump"
          if [[ -f "$CACHE_FILE" ]]; then
            echo "Cache file: $CACHE_FILE ($(du -h "$CACHE_FILE" | cut -f1))"
          else
            echo "No cache file present"
          fi
          echo "Cache matched key: ${{ steps.db-cache.outputs.cache-matched-key }}"
          echo "Cache exact hit: ${{ steps.db-cache.outputs.cache-hit }}"

      - name: Verify output
        run: |
          STATE_LOWER=$(echo "${{ matrix.state }}" | tr '[:upper:]' '[:lower:]')
          VERSION="${{ needs.setup.outputs.version }}"
          EXPECTED="output/flat-white-${VERSION}-${STATE_LOWER}.ndjson.gz"

          if [[ ! -f "$EXPECTED" ]]; then
            echo "ERROR: Expected output file not found: $EXPECTED"
            ls -la output/
            exit 1
          fi

          # Verify gzip integrity
          gzip -t "$EXPECTED"
          echo "✓ gzip integrity OK"

          # Count lines
          LINE_COUNT=$(zcat "$EXPECTED" | wc -l | tr -d ' ')
          echo "✓ ${{ matrix.state }}: $LINE_COUNT documents"

          if [[ "$LINE_COUNT" -eq 0 ]]; then
            echo "ERROR: Output file is empty"
            exit 1
          fi

          # Write count to file for concatenation job
          echo "$LINE_COUNT" > "output/${{ matrix.state }}.count"

      - name: Upload per-state artifact
        uses: actions/upload-artifact@v4
        with:
          name: flat-white-${{ matrix.state }}
          path: |
            output/flat-white-*.ndjson.gz
            output/${{ matrix.state }}.count
          retention-days: 7

      - name: Upload per-state telemetry
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quarterly-telemetry-${{ matrix.state }}
          path: |
            output/quarterly-telemetry-${{ matrix.state }}.json
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2: Concatenate all states into a single file (P3.02)
  # ---------------------------------------------------------------------------
  concatenate:
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    timeout-minutes: 30
    needs: [setup, build]
    if: ${{ !cancelled() && needs.build.result == 'success' }}

    steps:
      - name: Download all per-state artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: flat-white-*

      - name: Concatenate per-state gzips
        run: |
          RELEASE_VERSION="${{ needs.setup.outputs.release_version }}"
          ALL_FILE="flat-white-${RELEASE_VERSION}-all.ndjson.gz"

          echo "Concatenating per-state files into $ALL_FILE..."

          # Concatenated gzip files produce a valid gzip archive
          cat artifacts/flat-white-*/flat-white-*.ndjson.gz > "$ALL_FILE"

          echo "✓ Created $ALL_FILE ($(du -h "$ALL_FILE" | cut -f1))"

      - name: Verify all-states file
        run: |
          RELEASE_VERSION="${{ needs.setup.outputs.release_version }}"
          ALL_FILE="flat-white-${RELEASE_VERSION}-all.ndjson.gz"

          # Verify gzip integrity
          gzip -t "$ALL_FILE"
          echo "✓ gzip integrity OK"

          # Count total lines
          TOTAL=$(zcat "$ALL_FILE" | wc -l | tr -d ' ')
          echo "Total documents: $TOTAL"

          # Sum per-state counts
          EXPECTED_TOTAL=0
          for count_file in artifacts/flat-white-*/*.count; do
            STATE_COUNT=$(cat "$count_file")
            STATE=$(basename "$count_file" .count)
            echo "  $STATE: $STATE_COUNT"
            EXPECTED_TOTAL=$((EXPECTED_TOTAL + STATE_COUNT))
          done
          echo "Expected total: $EXPECTED_TOTAL"

          if [[ "$TOTAL" -ne "$EXPECTED_TOTAL" ]]; then
            echo "ERROR: Line count mismatch! Got $TOTAL, expected $EXPECTED_TOTAL"
            exit 1
          fi

          echo "✓ Line count verified: $TOTAL documents"

      - name: Upload all-states artifact
        uses: actions/upload-artifact@v4
        with:
          name: flat-white-all
          path: flat-white-*-all.ndjson.gz
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 3: Create GitHub Release with all assets (P3.03 + P3.04)
  # ---------------------------------------------------------------------------
  release:
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    timeout-minutes: 30
    needs: [setup, build, concatenate]
    if: ${{ !cancelled() && needs.build.result == 'success' && needs.concatenate.result == 'success' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all per-state artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: flat-white-*

      - name: Collect assets and generate metadata
        id: collect
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          RELEASE_VERSION="${{ needs.setup.outputs.release_version }}"
          ASSET_DIR="release-assets"
          mkdir -p "$ASSET_DIR"

          # Collect per-state gzips and count files. Source filenames are
          # `flat-white-${VERSION}-${state}.ndjson.gz` (built using gnaf data
          # version). For patch releases, we rename to RELEASE_VERSION here so
          # downstream consumers see e.g. `flat-white-2026.04.1-act.ndjson.gz`
          # and know their previous download is stale.
          TOTAL=0
          STATES_JSON="{"
          FIRST=true
          for state in VIC NSW QLD SA WA TAS NT ACT OT; do
            STATE_LOWER=$(echo "$state" | tr '[:upper:]' '[:lower:]')
            COUNT_FILE="artifacts/flat-white-${state}/${state}.count"

            # Assert exactly one .ndjson.gz per state artifact. Stale leftovers
            # from a transient retry would otherwise cause nondeterministic
            # asset selection (whichever `find` returned first).
            mapfile -t STATE_GZ_FILES < <(find "artifacts/flat-white-${state}" -name "*.ndjson.gz")
            if [[ ${#STATE_GZ_FILES[@]} -eq 0 ]]; then
              echo "ERROR: Missing gzip for $state"
              exit 1
            fi
            if [[ ${#STATE_GZ_FILES[@]} -gt 1 ]]; then
              echo "ERROR: Found ${#STATE_GZ_FILES[@]} gzips for $state — expected exactly 1:"
              printf '  %s\n' "${STATE_GZ_FILES[@]}"
              exit 1
            fi
            GZ_FILE="${STATE_GZ_FILES[0]}"

            cp "$GZ_FILE" "$ASSET_DIR/flat-white-${RELEASE_VERSION}-${STATE_LOWER}.ndjson.gz"

            COUNT=$(cat "$COUNT_FILE")
            TOTAL=$((TOTAL + COUNT))

            if [[ "$FIRST" == "true" ]]; then
              FIRST=false
            else
              STATES_JSON+=","
            fi
            STATES_JSON+="\"${state}\":${COUNT}"
          done
          STATES_JSON+="}"

          # All-states file excluded from release assets (exceeds 2GB GitHub limit).
          # Available as workflow artifact "flat-white-all" for direct download.

          # Read schema version from package.json
          SCHEMA_VERSION=$(node -p "require('./package.json').version")

          # Generate metadata.json
          # `version` is the release version (may have patch); `gnafVersion`
          # is always the underlying G-NAF data version (no patch).
          cat > "$ASSET_DIR/metadata.json" <<METAEOF
          {
            "version": "${RELEASE_VERSION}",
            "gnafVersion": "${VERSION}",
            "schemaVersion": "${SCHEMA_VERSION}",
            "buildTimestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "states": ${STATES_JSON},
            "totalCount": ${TOTAL}
          }
          METAEOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' "$ASSET_DIR/metadata.json"

          # Copy DOCUMENT-SCHEMA.md
          cp docs/DOCUMENT-SCHEMA.md "$ASSET_DIR/DOCUMENT-SCHEMA.md"

          # Export for later steps
          echo "total=${TOTAL}" >> "$GITHUB_OUTPUT"
          echo "schema_version=${SCHEMA_VERSION}" >> "$GITHUB_OUTPUT"
          echo "asset_dir=${ASSET_DIR}" >> "$GITHUB_OUTPUT"

      - name: Verify upstream artifacts present
        run: |
          ASSET_DIR="${{ steps.collect.outputs.asset_dir }}"

          # Early fail-fast: verify the per-state artifacts and metadata that
          # come from upstream stages (downloads + collect step) are present
          # BEFORE we spend ~minutes on report generation. This count does NOT
          # include verification-report.md or comparison reports — those are
          # generated by later steps in this same job.
          #
          # Expected at this point: 9 per-state ndjson.gz + metadata.json +
          # DOCUMENT-SCHEMA.md = 11.
          ASSET_COUNT=$(ls -1 "$ASSET_DIR" | wc -l | tr -d ' ')
          echo "Asset count (pre-report): $ASSET_COUNT"
          ls -lh "$ASSET_DIR"

          MIN_ASSETS=11  # 9 states + metadata.json + DOCUMENT-SCHEMA.md
          if [[ "$ASSET_COUNT" -lt "$MIN_ASSETS" ]]; then
            echo "ERROR: Expected at least $MIN_ASSETS upstream assets, got $ASSET_COUNT"
            exit 1
          fi
          echo "✓ Upstream asset count verified: $ASSET_COUNT (minimum $MIN_ASSETS)"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build verification tools
        run: npm ci && npm run build

      - name: Generate verification report (P4.02)
        id: verify_report
        run: |
          ASSET_DIR="${{ steps.collect.outputs.asset_dir }}"
          # NSW PID uniqueness Set can reach ~250-360MB; raise V8 heap limit to avoid OOM
          node --max-old-space-size=512 dist/verification-report.js "$ASSET_DIR" --output "$ASSET_DIR/verification-report.md"
          echo "✓ Verification report generated"
          cat "$ASSET_DIR/verification-report.md"

      - name: Verify final asset bundle and size
        run: |
          ASSET_DIR="${{ steps.collect.outputs.asset_dir }}"

          # Final check: verification-report.md must now exist on top of the
          # upstream 11. Plus optional comparison report(s) if prior release
          # exists (added later, not required at this point).
          if [[ ! -f "$ASSET_DIR/verification-report.md" ]]; then
            echo "ERROR: verification-report.md was not generated"
            exit 1
          fi

          ASSET_COUNT=$(ls -1 "$ASSET_DIR" | wc -l | tr -d ' ')
          echo "Asset count (post-report): $ASSET_COUNT"
          ls -lh "$ASSET_DIR"

          MIN_ASSETS=12  # 9 states + metadata + schema + verification-report
          if [[ "$ASSET_COUNT" -lt "$MIN_ASSETS" ]]; then
            echo "ERROR: Expected at least $MIN_ASSETS assets, got $ASSET_COUNT"
            exit 1
          fi
          echo "✓ Final asset count verified: $ASSET_COUNT (minimum $MIN_ASSETS)"

          # Verify total size under 2GB (2147483648 bytes — GitHub Release limit)
          TOTAL_SIZE=$(du -sb "$ASSET_DIR" | cut -f1)
          LIMIT=2147483648
          echo "Total asset size: $(du -sh "$ASSET_DIR" | cut -f1)"

          if [[ "$TOTAL_SIZE" -ge "$LIMIT" ]]; then
            echo "ERROR: Total asset size ($TOTAL_SIZE bytes) exceeds 2GB GitHub limit"
            exit 1
          fi
          echo "✓ Total size under 2GB"

      - name: Compare with prior release (P4.03)
        id: compare
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          RELEASE_VERSION="${{ needs.setup.outputs.release_version }}"
          ASSET_DIR="${{ steps.collect.outputs.asset_dir }}"
          HAS_ANOMALIES=false

          # Try to get prior release metadata (exclude drafts to avoid comparing against ourselves on re-runs)
          PRIOR_TAG=$(gh release list --exclude-drafts --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")

          if [[ -z "$PRIOR_TAG" ]]; then
            echo "No prior release found — skipping comparison"
            echo "has_anomalies=false" >> "$GITHUB_OUTPUT"
          elif [[ "$PRIOR_TAG" == "v${RELEASE_VERSION}" ]]; then
            echo "Prior release is same version (${PRIOR_TAG}) — skipping comparison (manual rebuild)"
            echo "has_anomalies=false" >> "$GITHUB_OUTPUT"
          elif [[ "$RELEASE_VERSION" != "$VERSION" && "$PRIOR_TAG" == "v${VERSION}" ]]; then
            # Patch release: prior is the parent quarterly cut. Counts should be ~identical
            # (same data, same code path). Skip count anomaly comparison.
            echo "Patch release: prior is parent quarterly v${VERSION} — skipping count comparison (same underlying data)"
            echo "has_anomalies=false" >> "$GITHUB_OUTPUT"
          else
            echo "Comparing against prior release: $PRIOR_TAG"
            mkdir -p /tmp/prior
            if gh release download "$PRIOR_TAG" --pattern "metadata.json" --dir /tmp/prior 2>/dev/null; then
              set +e
              node dist/compare-releases.js "$ASSET_DIR/metadata.json" "/tmp/prior/metadata.json" --threshold 1.0
              COMPARE_EXIT=$?
              set -e

              if [[ $COMPARE_EXIT -eq 2 ]]; then
                echo "::warning::Build-over-build anomalies detected — review before publishing"
                HAS_ANOMALIES=true
                # Copy comparison report to release assets
                find . -maxdepth 1 -name 'comparison-*.md' -exec cp {} "$ASSET_DIR/" \;
                if ! ls "$ASSET_DIR"/comparison-*.md >/dev/null 2>&1; then
                  echo "::warning::Comparison report not copied to release assets"
                fi
              fi
            else
              echo "Could not download prior metadata — skipping comparison"
            fi
            echo "has_anomalies=${HAS_ANOMALIES}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          RELEASE_VERSION="${{ needs.setup.outputs.release_version }}"
          TOTAL="${{ steps.collect.outputs.total }}"
          SCHEMA_VERSION="${{ steps.collect.outputs.schema_version }}"
          ASSET_DIR="${{ steps.collect.outputs.asset_dir }}"

          # If this is a patch release, build a clear "supersedes" notice
          IS_PATCH=false
          PATCH_NOTICE=""
          if [[ "$RELEASE_VERSION" != "$VERSION" ]]; then
            IS_PATCH=true
            PATCH_NOTICE="> ⚠️ **Patch release.** This is a hotfix for v${VERSION}. The underlying G-NAF data is unchanged (still ${VERSION}). Asset filenames are versioned as \`flat-white-${RELEASE_VERSION}-{state}.ndjson.gz\` so consumers can detect that previous downloads are stale. See CHANGELOG.md for the list of fixes."
          fi

          # Try to get prior release metadata for delta calculation (exclude drafts to avoid self-comparison)
          PRIOR_TAG=$(gh release list --exclude-drafts --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          HAS_DELTA=false

          if [[ -n "$PRIOR_TAG" ]]; then
            # Download prior metadata.json
            if gh release download "$PRIOR_TAG" --pattern "metadata.json" --dir /tmp/prior 2>/dev/null; then
              HAS_DELTA=true
              PRIOR_TOTAL=$(node -p "require('/tmp/prior/metadata.json').totalCount")
              DELTA_TOTAL=$((TOTAL - PRIOR_TOTAL))
              if [[ "$DELTA_TOTAL" -ge 0 ]]; then
                DELTA_TOTAL_FMT="+${DELTA_TOTAL}"
              else
                DELTA_TOTAL_FMT="${DELTA_TOTAL}"
              fi
            fi
          fi

          # Get gnaf-loader version from submodule commit pinned in parent repo
          # (works without submodule init — reads the tree object directly)
          GNAF_LOADER_VERSION=$(git ls-tree HEAD gnaf-loader | awk '{print $3}' | cut -c1-7)
          if [[ -z "$GNAF_LOADER_VERSION" ]]; then
            GNAF_LOADER_VERSION="unknown"
          fi

          # Build release notes
          NOTES_FILE=$(mktemp)
          cat > "$NOTES_FILE" <<NOTESEOF
          Pre-joined, boundary-enriched Australian address data from G-NAF ${VERSION}.
          ${PATCH_NOTICE}

          ## Summary

          - **Total addresses:** $(printf "%'d" "$TOTAL")$(if [[ "$HAS_DELTA" == "true" ]]; then echo " (${DELTA_TOTAL_FMT} from ${PRIOR_TAG})"; fi)
          - **Release version:** ${RELEASE_VERSION}
          - **G-NAF data version:** ${VERSION}
          - **Schema version:** ${SCHEMA_VERSION}
          - **gnaf-loader version:** ${GNAF_LOADER_VERSION}

          ## Per-State Document Counts

          | State | Count |$(if [[ "$HAS_DELTA" == "true" ]]; then echo " Delta |"; fi)
          |-------|------:|$(if [[ "$HAS_DELTA" == "true" ]]; then echo "------:|"; fi)
          NOTESEOF

          for state in ACT NSW NT OT QLD SA TAS VIC WA; do
            COUNT_FILE="artifacts/flat-white-${state}/${state}.count"
            COUNT=$(cat "$COUNT_FILE")
            COUNT_FMT=$(printf "%'d" "$COUNT")
            ROW="| ${state} | ${COUNT_FMT} |"

            if [[ "$HAS_DELTA" == "true" ]]; then
              PRIOR_COUNT=$(node -p "require('/tmp/prior/metadata.json').states?.${state} ?? 0" 2>/dev/null || echo "0")
              DELTA=$((COUNT - PRIOR_COUNT))
              if [[ "$DELTA" -ge 0 ]]; then
                ROW+=" +${DELTA} |"
              else
                ROW+=" ${DELTA} |"
              fi
            fi

            echo "$ROW" >> "$NOTES_FILE"
          done

          cat >> "$NOTES_FILE" <<'DLEOF'

          ## Downloads

          Download individual state files or the complete dataset:

          ```bash
          # Single state (e.g. Victoria)
          gh release download v{VERSION} --pattern '*-vic.ndjson.gz'

          # All states in one file
          gh release download v{VERSION} --pattern '*-all.ndjson.gz'

          # Everything
          gh release download v{VERSION}
          ```

          ## Schema

          The document schema reference is included as a release asset (`DOCUMENT-SCHEMA.md`).
          Each line in the NDJSON files is one JSON document conforming to this schema.
          DLEOF

          # For patch releases, auto-link merged PRs between the base version tag and HEAD
          if [[ "$IS_PATCH" == "true" ]]; then
            BASE_TAG="v${VERSION}"
            PR_LINKS=""
            if git rev-parse "$BASE_TAG" >/dev/null 2>&1; then
              # Find merge commits between the base tag and HEAD, extract PR numbers
              PR_NUMBERS=$(git log "${BASE_TAG}..HEAD" --oneline --grep='(#' | grep -oP '\(#\K[0-9]+' | sort -un || true)
              if [[ -n "$PR_NUMBERS" ]]; then
                PR_LINKS=$'\n## Fixes\n\n'
                while IFS= read -r pr_num; do
                  PR_TITLE=$(gh pr view "$pr_num" --json title --jq '.title' 2>/dev/null || echo "")
                  if [[ -n "$PR_TITLE" ]]; then
                    PR_LINKS+="- ${PR_TITLE} (#${pr_num})"$'\n'
                  else
                    PR_LINKS+="- #${pr_num}"$'\n'
                  fi
                done <<< "$PR_NUMBERS"
              fi
            fi
            if [[ -n "$PR_LINKS" ]]; then
              echo "$PR_LINKS" >> "$NOTES_FILE"
            fi
          fi

          # Replace {VERSION} placeholder in download examples (use release_version
          # so the gh download commands reference the correct tag and asset names)
          sed -i "s/{VERSION}/${RELEASE_VERSION}/g" "$NOTES_FILE"

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' "$NOTES_FILE"

          echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

          echo "--- Release Notes Preview ---"
          cat "$NOTES_FILE"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          RELEASE_VERSION="${{ needs.setup.outputs.release_version }}"
          SCHEMA_VERSION="${{ steps.collect.outputs.schema_version }}"
          TOTAL="${{ steps.collect.outputs.total }}"
          BUILD_DATE=$(date -u +%Y-%m-%d)

          # Build per-state counts as a newline-separated string
          STATE_COUNTS=""
          for state in ACT NSW NT OT QLD SA TAS VIC WA; do
            COUNT_FILE="artifacts/flat-white-${state}/${state}.count"
            COUNT=$(cat "$COUNT_FILE")
            COUNT_FMT=$(printf "%'d" "$COUNT")
            STATE_COUNTS+="  - ${state}: ${COUNT_FMT}"$'\n'
          done

          # Use Python to build the entry, move [Unreleased] content into it, and
          # leave [Unreleased] empty. Idempotent: re-running on the same version
          # replaces the existing entry rather than duplicating it.
          python3 -c "
          import sys, re, textwrap
          release_version, gnaf_version, build_date, schema_version, total, state_counts = sys.argv[1:7]

          entry = f'''## [v{release_version}] - {build_date}

          ### Release

          - **Release version:** {release_version}
          - **G-NAF data version:** {gnaf_version}
          - **Schema version:** {schema_version}
          - **Total addresses:** {total}
          - **Per-state counts:**
          {state_counts}'''

          entry = textwrap.dedent(entry)

          content = open('CHANGELOG.md').read()

          # Idempotency: if this version entry already exists, remove it first
          content = re.sub(
              r'## \[v' + re.escape(release_version) + r'\] - \d{4}-\d{2}-\d{2}\n(?:(?!## \[).)*',
              '',
              content,
              count=1,
              flags=re.DOTALL,
          )

          # Find [Unreleased] section and extract its body
          unreleased_pattern = r'(## \[Unreleased\]\n)(.*?)((?=\n## \[)|\Z)'
          m = re.search(unreleased_pattern, content, re.DOTALL)
          if m:
              unreleased_body = m.group(2).strip()
              # Replace [Unreleased] section: keep header, clear body, insert new entry
              replacement = m.group(1) + '\n' + entry
              if unreleased_body:
                  replacement += '\n\n' + unreleased_body
              replacement += '\n'
              content = content[:m.start()] + replacement + content[m.end():]
          else:
              # No [Unreleased] header found — just prepend entry
              content = entry + '\n\n' + content

          open('CHANGELOG.md', 'w').write(content)
          " "$RELEASE_VERSION" "$VERSION" "$BUILD_DATE" "$SCHEMA_VERSION" "$(printf "%'d" "$TOTAL")" "$STATE_COUNTS"

          # Commit the changelog update (best-effort — release proceeds even if push fails).
          # The release assets are the critical artifacts; a missing CHANGELOG commit
          # can be manually pushed after the fact.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          export HUSKY=0
          git add CHANGELOG.md
          git commit --no-verify -m "docs: update CHANGELOG.md for v${RELEASE_VERSION} release"
          git push || echo "::warning::CHANGELOG push failed (branch protection). Release still proceeds — push CHANGELOG manually."

      - name: Create GitHub Release (draft)
        run: |
          RELEASE_VERSION="${{ needs.setup.outputs.release_version }}"
          TAG="v${RELEASE_VERSION}"
          ASSET_DIR="${{ steps.collect.outputs.asset_dir }}"
          NOTES_FILE="${{ steps.notes.outputs.notes_file }}"

          # Idempotency guard: delete any existing release for this tag (re-run safety).
          # For patch releases (e.g. v2026.04.1), this only deletes the patch tag —
          # the original v2026.04 release is untouched.
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

          # Create as draft — only publish after verification passes
          gh release create "$TAG" \
            --draft \
            --title "flat-white ${TAG}" \
            --notes-file "$NOTES_FILE" \
            "$ASSET_DIR"/*
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify release
        run: |
          RELEASE_VERSION="${{ needs.setup.outputs.release_version }}"
          TAG="v${RELEASE_VERSION}"

          echo "--- Release Details ---"
          gh release view "$TAG"

          echo ""
          echo "--- Release Assets ---"
          ASSET_COUNT=$(gh release view "$TAG" --json assets --jq '.assets | length')
          echo "Asset count: $ASSET_COUNT"

          MIN_RELEASE_ASSETS=12  # 9 states + metadata + schema + verification report
          if [[ "$ASSET_COUNT" -lt "$MIN_RELEASE_ASSETS" ]]; then
            echo "ERROR: Expected at least $MIN_RELEASE_ASSETS release assets, got $ASSET_COUNT"
            exit 1
          fi
          echo "✓ All $ASSET_COUNT assets uploaded successfully"

          echo ""
          echo "--- Programmatic Download Test ---"
          mkdir -p /tmp/download-test
          gh release download "$TAG" --pattern "*-act.ndjson.gz" --dir /tmp/download-test
          ls -lh /tmp/download-test/

          echo ""
          HAS_ANOMALIES="${{ steps.compare.outputs.has_anomalies }}"
          if [[ "$HAS_ANOMALIES" == "true" ]]; then
            echo "--- Release kept as DRAFT due to build-over-build anomalies ---"
            echo "::warning::Release $TAG kept as draft — review anomalies in verification-report.md and comparison report before publishing"
            echo "To publish manually: gh release edit $TAG --draft=false"
          else
            echo "--- Publishing release (draft → public) ---"
            gh release edit "$TAG" --draft=false
            echo "✓ Release published"
          fi
          echo "✓ Programmatic download works"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Notify downstream repositories
        if: ${{ success() }}
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          RELEASE_VERSION="${{ needs.setup.outputs.release_version }}"
          TAG="v${RELEASE_VERSION}"
          TOTAL="${{ steps.collect.outputs.total }}"
          SCHEMA_VERSION="${{ steps.collect.outputs.schema_version }}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"

          # Build asset URLs for downstream consumers
          PAYLOAD=$(cat <<PAYLOADEOF
          {
            "version": "${TAG}",
            "gnafVersion": "${VERSION}",
            "schemaVersion": "${SCHEMA_VERSION}",
            "totalCount": ${TOTAL},
            "releaseUrl": "${REPO_URL}/releases/tag/${TAG}",
            "assets": {
              "metadata": "${REPO_URL}/releases/download/${TAG}/metadata.json"
            }
          }
          PAYLOADEOF
          )
          # Remove leading whitespace from heredoc
          PAYLOAD=$(echo "$PAYLOAD" | sed 's/^          //')

          echo "--- Dispatch Payload ---"
          echo "$PAYLOAD" | jq .

          # Dispatch to each downstream repo
          # Requires DISPATCH_TOKEN secret with repo scope on target repos
          for REPO in "geocode-au"; do
            echo "Dispatching to ${REPO}..."
            BODY=$(jq -n --argjson payload "$PAYLOAD" '{"event_type":"flat-white-release","client_payload":$payload}')
            echo "$BODY" | gh api \
              --method POST \
              "repos/${{ github.repository_owner }}/${REPO}/dispatches" \
              --input - \
              && echo "✓ Dispatched to ${REPO}" \
              || echo "::warning::Failed to dispatch to ${REPO} (may need DISPATCH_TOKEN secret with repo scope)"
          done
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 4: S3 mirror upload (P5.01)
  # ---------------------------------------------------------------------------
  # Uploads all release artifacts (per-state ndjson.gz files, metadata.json,
  # DOCUMENT-SCHEMA.md, verification-report.md) PLUS the all-states concatenated
  # file to s3://flat-white-address-493712557159-ap-southeast-2-an/builds/v{version}/
  #
  # The all-states file (~1.5-2GB) is the unique value-add of the S3 mirror —
  # it exceeds GitHub's 2GB per-asset release limit and is excluded from the
  # GitHub Release. S3 has no such limit (5GB single PUT, 5TB max object).
  #
  # Authentication: OIDC via aws-actions/configure-aws-credentials@v4 against
  # arn:aws:iam::493712557159:role/flat-white-role. The role's trust policy
  # restricts to repo:jbejenar/flat-white:* via the GitHub OIDC provider.
  # Validated end-to-end by .github/workflows/s3-smoke.yml.
  #
  # Failure semantics: this job is NON-BLOCKING for the release. If S3 upload
  # fails, the GitHub Release is still published correctly (it's already done
  # by the time s3-upload runs). The S3 mirror is redundancy, not the primary
  # distribution. A failure here is loud (job marked failed in the workflow
  # summary) but doesn't undo anything upstream.
  s3-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup, release, concatenate]
    if: ${{ !cancelled() && needs.release.result == 'success' && needs.concatenate.result == 'success' }}
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ap-southeast-2
      AWS_ROLE: arn:aws:iam::493712557159:role/flat-white-role
      S3_BUCKET: flat-white-address-493712557159-ap-southeast-2-an
    steps:
      # No actions/checkout needed — this job doesn't read any repo files.
      # gh release download uses the GitHub API + GH_TOKEN, not a local clone.

      - name: Download all-states artifact (concatenate output) to staging
        uses: actions/download-artifact@v4
        with:
          name: flat-white-all
          path: s3-upload-staging/

      - name: Normalise staging into s3-upload/ (flatten any subdirectories)
        run: |
          mkdir -p s3-upload/
          # Robust against both actions/download-artifact@v4 single-artifact
          # extraction modes (some versions extract directly to path/, others
          # nest under path/{artifact-name}/). Move every regular file under
          # s3-upload-staging/ into s3-upload/ at the top level.
          find s3-upload-staging/ -type f -exec mv -v {} s3-upload/ \;
          rm -rf s3-upload-staging/
          echo ""
          echo "--- s3-upload/ after normalisation ---"
          ls -lh s3-upload/

      - name: Download published GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ needs.setup.outputs.release_version }}"
          echo "Downloading all assets from release ${TAG}..."
          cd s3-upload/
          gh release download "$TAG" --repo "${{ github.repository }}"
          echo ""
          echo "--- s3-upload/ contents (all-states + GitHub Release assets) ---"
          ls -lh
          echo ""
          echo "--- Total size ---"
          du -sh .

      - name: Verify s3-upload/ has no unexpected subdirectories
        run: |
          # All files should be at the top level of s3-upload/. If anything
          # ended up in a subdirectory (unexpected upload-artifact behavior,
          # gh release download quirk), fail loud BEFORE syncing to S3 with
          # a misshapen layout.
          UNEXPECTED=$(find s3-upload/ -mindepth 2 -type f)
          if [[ -n "$UNEXPECTED" ]]; then
            echo "::error::Files found in unexpected subdirectories:"
            echo "$UNEXPECTED"
            exit 1
          fi
          echo "✓ All files at top level of s3-upload/"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify caller identity
        run: |
          aws sts get-caller-identity
          echo "✓ AWS role assumed"

      - name: Upload to S3
        run: |
          TAG="v${{ needs.setup.outputs.release_version }}"
          DEST="s3://${S3_BUCKET}/builds/${TAG}/"

          echo "Syncing s3-upload/ to ${DEST}"
          # --no-progress: cleaner CI logs, no per-byte updates
          # --only-show-errors: don't print every successful upload
          aws s3 sync s3-upload/ "${DEST}" --no-progress --only-show-errors
          echo "✓ S3 sync complete"

          echo ""
          echo "--- Remote ${DEST} contents ---"
          aws s3 ls "${DEST}" --human-readable

          echo ""
          echo "--- Total objects ---"
          aws s3 ls "${DEST}" --recursive | wc -l | xargs echo "objects:"

      - name: Verify upload integrity
        run: |
          TAG="v${{ needs.setup.outputs.release_version }}"

          # Compare local and remote: every file in s3-upload/ must exist in
          # S3 with matching ContentLength. aws s3 sync already did the upload
          # and aws's internal retries; this is a defensive post-check that
          # catches silent corruption or any layout drift.
          #
          # GitHub runners are Linux, so stat -c%s is the correct invocation
          # (no BSD fallback needed).
          #
          # No -maxdepth filter on find: the prior step already enforced that
          # all files are at the top level of s3-upload/, so this loop sees
          # exactly the set of files we intend to verify.
          MISMATCH=0
          while IFS= read -r local_file; do
            local_size=$(stat -c%s "$local_file")
            base=$(basename "$local_file")
            remote_size=$(aws s3api head-object \
              --bucket "${S3_BUCKET}" \
              --key "builds/${TAG}/${base}" \
              --query 'ContentLength' \
              --output text 2>/dev/null || echo "MISSING")
            if [[ "$remote_size" == "MISSING" ]]; then
              echo "::error::Missing in S3: ${base}"
              MISMATCH=1
            elif [[ "$local_size" != "$remote_size" ]]; then
              echo "::error::Size mismatch: ${base} local=${local_size} remote=${remote_size}"
              MISMATCH=1
            else
              echo "✓ ${base} (${local_size} bytes)"
            fi
          done < <(find s3-upload/ -type f)

          if [[ "$MISMATCH" -ne 0 ]]; then
            echo ""
            echo "::error::Upload integrity check failed"
            exit 1
          fi

          echo ""
          echo "✓ All files verified in S3"
