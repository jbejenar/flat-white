name: Quarterly Build

on:
  workflow_dispatch:
    inputs:
      gnaf_version:
        description: "G-NAF version (e.g. 2026.05)"
        required: false
        default: ""
  schedule:
    # 15th of Feb, May, Aug, Nov at 02:00 UTC — shortly after quarterly G-NAF release
    - cron: "0 2 15 2,5,8,11 *"

env:
  # Default version: YYYY.MM from trigger date (overridden by workflow_dispatch input)
  DOCKER_IMAGE: flat-white

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build each state in parallel
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        state: [VIC, NSW, QLD, SA, WA, TAS, NT, ACT, OT]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ inputs.gnaf_version }}" ]]; then
            echo "version=${{ inputs.gnaf_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(date +%Y.%m)" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.DOCKER_IMAGE }}:build
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run pipeline for ${{ matrix.state }}
        run: |
          mkdir -p output
          docker run --rm \
            -v "$(pwd)/output:/output" \
            -e "GNAF_VERSION=${{ steps.version.outputs.version }}" \
            ${{ env.DOCKER_IMAGE }}:build \
            --states ${{ matrix.state }} \
            --split-states \
            --compress \
            --output /output

      - name: Verify output
        run: |
          STATE_LOWER=$(echo "${{ matrix.state }}" | tr '[:upper:]' '[:lower:]')
          VERSION="${{ steps.version.outputs.version }}"
          EXPECTED="output/flat-white-${VERSION}-${STATE_LOWER}.ndjson.gz"

          if [[ ! -f "$EXPECTED" ]]; then
            echo "ERROR: Expected output file not found: $EXPECTED"
            ls -la output/
            exit 1
          fi

          # Verify gzip integrity
          gzip -t "$EXPECTED"
          echo "✓ gzip integrity OK"

          # Count lines
          LINE_COUNT=$(zcat "$EXPECTED" | wc -l | tr -d ' ')
          echo "✓ ${{ matrix.state }}: $LINE_COUNT documents"

          if [[ "$LINE_COUNT" -eq 0 ]]; then
            echo "ERROR: Output file is empty"
            exit 1
          fi

          # Write count to file for concatenation job
          echo "$LINE_COUNT" > "output/${{ matrix.state }}.count"

      - name: Upload per-state artifact
        uses: actions/upload-artifact@v4
        with:
          name: flat-white-${{ matrix.state }}
          path: |
            output/flat-white-*.ndjson.gz
            output/${{ matrix.state }}.count
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2: Concatenate all states into a single file (P3.02)
  # ---------------------------------------------------------------------------
  concatenate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    if: ${{ !cancelled() && needs.build.result == 'success' }}

    steps:
      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ inputs.gnaf_version }}" ]]; then
            echo "version=${{ inputs.gnaf_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(date +%Y.%m)" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all per-state artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: flat-white-*

      - name: Concatenate per-state gzips
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ALL_FILE="flat-white-${VERSION}-all.ndjson.gz"

          echo "Concatenating per-state files into $ALL_FILE..."

          # Concatenated gzip files produce a valid gzip archive
          cat artifacts/flat-white-*/flat-white-*.ndjson.gz > "$ALL_FILE"

          echo "✓ Created $ALL_FILE ($(du -h "$ALL_FILE" | cut -f1))"

      - name: Verify all-states file
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ALL_FILE="flat-white-${VERSION}-all.ndjson.gz"

          # Verify gzip integrity
          gzip -t "$ALL_FILE"
          echo "✓ gzip integrity OK"

          # Count total lines
          TOTAL=$(zcat "$ALL_FILE" | wc -l | tr -d ' ')
          echo "Total documents: $TOTAL"

          # Sum per-state counts
          EXPECTED_TOTAL=0
          for count_file in artifacts/flat-white-*/*.count; do
            STATE_COUNT=$(cat "$count_file")
            STATE=$(basename "$count_file" .count)
            echo "  $STATE: $STATE_COUNT"
            EXPECTED_TOTAL=$((EXPECTED_TOTAL + STATE_COUNT))
          done
          echo "Expected total: $EXPECTED_TOTAL"

          if [[ "$TOTAL" -ne "$EXPECTED_TOTAL" ]]; then
            echo "ERROR: Line count mismatch! Got $TOTAL, expected $EXPECTED_TOTAL"
            exit 1
          fi

          echo "✓ Line count verified: $TOTAL documents"

      - name: Upload all-states artifact
        uses: actions/upload-artifact@v4
        with:
          name: flat-white-all
          path: flat-white-*-all.ndjson.gz
          retention-days: 7
